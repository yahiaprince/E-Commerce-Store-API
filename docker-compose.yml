version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: store-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # ports:
    #   - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: store-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always

volumes:
  mysql_data: