spring:
  application:
    name: store

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 7200 # 2h
    refresh-token-expiration: 604800 # 7 days
  profiles:
    active: dev
flyway:
    enabled: true
    locations: classpath:db/migration
stripe:
  secretKey : ${STRIPE_SECRET_KEY}
  webhookSecretKey: ${STRIPE_WEBHOOK_SECRET_KEY}
springdoc:
  api-docs:
    enabled: true

setup:
  token: ${SETUP_TOKEN:}